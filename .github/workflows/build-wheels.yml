name: Build and Package Python Wheels

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.flavor }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-22.04
            target: linux-x86_64
            flavor: standard
            args: "-p mistralrs"
          
          # Windows x86_64
          - os: windows-latest
            target: windows-x86_64
            flavor: standard
            args: "-p mistralrs"

          # macOS aarch64
          - os: macos-latest
            target: macos-arm64
            flavor: standard
            args: "-p mistralrs"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin
      - name: Install patchelf (Linux only)
        if: runner.os == 'Linux'
        run: python -m pip install patchelf
      - name: Build Wheels
        run: make mistral.rs && cd mistral.rs && python scripts/build_wheels.py ${{ matrix.args }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "15.0"
          MATURIN_PY_EXE: python
          CUDA_COMPUTE_CAP: 86

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          path: mistral.rs/wheels/**/*.whl
          archive: false
          if-no-files-found: error
      - name: Upload to PyPI
        run: |
          mkdir -p dist
          cp mistral.rs/wheels/**/*.whl dist
          for f in dist/*.whl; do mv -- "$f" "${f//mistralrs/minllm}"; done
          uvx twine upload --repository minllm dist/*
